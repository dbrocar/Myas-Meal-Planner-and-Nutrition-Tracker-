<title>Mya's Meal Planner 🐾</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0f1720;color:#e8dcc8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}
.header{background:#0a1018;padding:16px 20px 0;border-bottom:1px solid rgba(200,147,58,0.2);position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.app-title{font-size:20px;font-weight:700;color:#c8933a;}
.tabs{display:flex;}
.tab{flex:1;padding:10px 4px;font-size:12px;font-weight:600;color:#666;background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;}
.tab.active{color:#c8933a;border-bottom-color:#c8933a;}
.page{padding:16px;padding-bottom:80px;display:none;}
.page.active{display:block;}
.date-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;background:#1a2535;border-radius:12px;padding:12px 16px;}
.nav-btn{background:rgba(200,147,58,0.15);border:1px solid rgba(200,147,58,0.3);color:#c8933a;border-radius:8px;padding:8px 18px;font-size:20px;cursor:pointer;}
.date-center{text-align:center;}
.date-main{font-size:15px;font-weight:700;}
.date-sub{font-size:11px;color:#888;margin-top:3px;}
.meal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.meal-card{background:#1a2535;border:1px solid rgba(200,147,58,0.2);border-radius:12px;padding:12px;}
.meal-card.fed{background:#1a2f1a;border-color:rgba(76,175,80,0.4);}
.slot-label{font-size:10px;font-weight:700;color:#666;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.meal-protein{font-size:13px;font-weight:700;margin-bottom:4px;line-height:1.3;}
.meal-details{font-size:11px;color:#888;line-height:1.6;}
.addin-tags{margin-top:6px;padding:5px 7px;background:rgba(200,147,58,0.08);border-radius:6px;}
.addin-tag{font-size:10px;color:#c8933a;}
.addins-btn{width:100%;margin-top:8px;padding:7px 0;background:transparent;border:1px solid rgba(200,147,58,0.4);color:#c8933a;border-radius:8px;font-size:11px;cursor:pointer;}

.fed-btn.active{background:#4caf50;color:#fff;}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.75);z-index:200;display:flex;align-items:flex-end;}
.modal{background:#1a2535;border-radius:16px 16px 0 0;width:100%;padding:20px;max-height:75vh;overflow-y:auto;}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.modal-title{font-size:15px;font-weight:700;color:#c8933a;}
.modal-close{background:transparent;border:none;color:#888;font-size:22px;cursor:pointer;line-height:1;}
.modal-hint{font-size:11px;color:#666;margin-bottom:14px;}
.ai-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.06);}
.ai-name{font-size:14px;flex:1;}
.ai-right{display:flex;align-items:center;gap:8px;}
.ai-input{width:58px;padding:6px 8px;background:#0f1720;border:1px solid rgba(200,147,58,0.3);border-radius:8px;color:#e8dcc8;font-size:14px;text-align:center;-webkit-appearance:none;}
.ai-unit{font-size:11px;color:#666;}
.save-btn{width:100%;padding:14px;background:#c8933a;border:none;border-radius:10px;color:#0f1720;font-size:15px;font-weight:700;cursor:pointer;margin-top:16px;}
.summary-box{background:#1a2535;border-radius:12px;padding:14px;margin-bottom:12px;}
.summary-title{font-size:13px;font-weight:700;margin-bottom:4px;}
.summary-sub{font-size:11px;color:#888;margin-bottom:10px;}
.pill-row{display:flex;gap:8px;flex-wrap:wrap;}
.s-pill{padding:4px 12px;border-radius:99px;font-size:12px;font-weight:700;}
.n-card{background:#1a2535;border-radius:10px;padding:12px;margin-bottom:8px;}
.n-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.n-name{font-size:12px;font-weight:700;}
.n-val{font-size:11px;}

.bar-bg{height:5px;background:#0a1018;border-radius:3px;margin-bottom:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;}
.n-range{font-size:10px;color:#555;}
.recipe-card{background:#1a2535;border-radius:12px;padding:16px;margin-bottom:12px;}
.r-title{font-size:15px;font-weight:700;color:#c8933a;margin-bottom:10px;}
.r-section{font-size:10px;font-weight:700;color:#555;letter-spacing:1px;text-transform:uppercase;margin-top:10px;margin-bottom:5px;}
.r-item{font-size:12px;color:#b0a090;line-height:1.9;}

.empty-state{text-align:center;padding-top:60px;}

// current date as y/m/d integers — avoids all timezone/ISO string issues
var today = new Date();
var curYear = today.getFullYear();
var curMonth = today.getMonth();
var curDay = today.getDate();

function dateKey(y,m,d) {
  return y + "-" + (m<10?"0"+m:m) + "-" + (d<10?"0"+d:d);
}

function getDayOfWeek(y,m,d) {
  return new Date(y, m, d).getDay(); // 0=Sun
}

function getWeekNum(y,m,d) {
  var jan1 = new Date(y, 0, 1);
  var doy = Math.round((new Date(y,m,d) - jan1) / 86400000);
  return (Math.floor(doy / 7) % 4) + 1;
}

function formatDateLabel(y,m,d) {
  var names = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var dow = getDayOfWeek(y,m,d);
  return names[dow] + ", " + months[m] + " " + d;
}

function advanceDay(n) {
  var dt = new Date(curYear, curMonth, curDay + n);
  curYear = dt.getFullYear();
  curMonth = dt.getMonth();
  curDay = dt.getDate();
}

// ── NUTRITION CALC ────────────────────────────────────────────────────────────
function zeroNutr() {
  var t = {};
  for (var i=0; i<KEYS.length; i++) t[KEYS[i]] = 0;
  return t;
}

function addFood(totals, src, oz) {
  if (!src) return;
  for (var i=0; i<KEYS.length; i++) totals[KEYS[i]] += (src[KEYS[i]] || 0) * oz;
}

function calcMeal(mealObj, addins) {
  var t = zeroNutr();
  if (mealObj) {
    addFood(t, FOODS[mealObj.protein], 8);
    addFood(t, FOODS[mealObj.starch], 2.5);
    addFood(t, FOODS[mealObj.veg], 2.5);
    if (mealObj.organ) addFood(t, FOODS[mealObj.organ], 0.5);
    for (var i=0; i<KEYS.length; i++) t[KEYS[i]] += SUPPS[KEYS[i]] || 0;
  }
  if (addins) {
    var names = Object.keys(addins);
    for (var j=0; j<names.length; j++) {
      var oz = addins[names[j]];
      if (oz > 0) addFood(t, ADDINS[names[j]], oz);
    }
  }
  return t;
}

// ── TAB SWITCHING ─────────────────────────────────────────────────────────────
function showTab(name) {
  var tabs = ["calendar","nutrition","recipes"];
  for (var i=0; i<tabs.length; i++) {
    var pg = document.getElementById("page-"+tabs[i]);
    var tb = document.getElementById("tab-"+tabs[i]);
    if (tabs[i] === name) {
      pg.className = "page active";
      tb.className = "tab active";
    } else {
      pg.className = "page";
      tb.className = "tab";
    }
  }
  if (name === "calendar")  renderCalendar();
  if (name === "nutrition") renderNutrition();
  if (name === "recipes")   renderRecipes();
}

// ── CALENDAR ──────────────────────────────────────────────────────────────────
function renderCalendar() {
  var ds = dateKey(curYear, curMonth, curDay);
  var dow = getDayOfWeek(curYear, curMonth, curDay);
  var wk = getWeekNum(curYear, curMonth, curDay);
  var dayName = DAYS_OF_WEEK[dow];
  var dayMeals = (WEEKS[wk] || {})[dayName] || {};
  var label = formatDateLabel(curYear, curMonth, curDay);

  var html = '<div class="date-nav">'
    + '<button class="nav-btn" onclick="changeDay(-1)">&#8249;</button>'
    + '<div class="date-center"><div class="date-main">' + label + '</div>'
    + '<div class="date-sub">Week ' + wk + ' &middot; ' + dayName + '</div></div>'
    + '<button class="nav-btn" onclick="changeDay(1)">&#8250;</button>'
    + '</div>'
    + '<div class="meal-grid">'
    + buildMealCard(ds, "am", "AM", dayMeals.am)
    + buildMealCard(ds, "pm", "PM", dayMeals.pm)
    + '</div>';

  document.getElementById("page-calendar").innerHTML = html;
}

function buildMealCard(ds, slot, label, mealObj) {
  var key = ds + "_" + slot;
  var fed = !!fedLog[key];
  var addins = addinsLog[key] || {};
  var addinNames = Object.keys(addins).filter(function(k){ return addins[k] > 0; });

  var html = '<div class="meal-card' + (fed ? " fed" : "") + '">'
    + '<div class="slot-label">' + label + '</div>';

  if (mealObj) {
    html += '<div class="meal-protein">' + mealObj.protein + '</div>'
      + '<div class="meal-details">'
      + mealObj.starch + '<br>'
      + mealObj.veg + '<br>'
      + (mealObj.organ ? mealObj.organ : '<span style="color:#444">no organ</span>')
      + '</div>';

    if (addinNames.length > 0) {
      html += '<div class="addin-tags">';
      for (var i=0; i<addinNames.length; i++) {
        html += '<div class="addin-tag">' + addinNames[i] + ': ' + addins[addinNames[i]] + ' oz</div>';
      }
      html += '</div>';
    }

    html += '<button class="addins-btn" onclick="openModal(\'' + ds + '\',\'' + slot + '\')">+ Add-ins</button>'
      + '<button class="fed-btn' + (fed ? " active" : "") + '" onclick="toggleFed(\'' + key + '\')">'
      + (fed ? "&#10003; Fed!" : "Mark Fed") + '</button>';
  } else {
    html += '<div style="color:#444;font-size:12px;margin-top:8px">No meal scheduled</div>';
  }

  return html + '</div>';
}

function changeDay(n) {
  advanceDay(n);
  renderCalendar();
}

function toggleFed(key) {
  fedLog[key] = !fedLog[key];
  try { localStorage.setItem("mya_fed", JSON.stringify(fedLog)); } catch(e) {}
  renderCalendar();
}

// ── ADD-INS MODAL ─────────────────────────────────────────────────────────────
var _modalKey = "";

function openModal(ds, slot) {
  _modalKey = ds + "_" + slot;
  var saved = addinsLog[_modalKey] || {};

  // figure out meal name for title
  var dow = getDayOfWeek(curYear, curMonth, curDay);
  var wk  = getWeekNum(curYear, curMonth, curDay);
  var dayName = DAYS_OF_WEEK[dow];
  var dayMeals = (WEEKS[wk] || {})[dayName] || {};
  var m = dayMeals[slot];
  var mName = m ? m.protein : "this meal";

  var rows = "";
  for (var i=0; i<ADDIN_NAMES.length; i++) {
    var name = ADDIN_NAMES[i];
    var safeId = "ai" + i;
    var val = saved[name] || "";
    rows += '<div class="ai-row">'
      + '<span class="ai-name">' + name + '</span>'
      + '<div class="ai-right">'
      + '<input class="ai-input" type="number" step="0.25" min="0" max="4" id="' + safeId + '" value="' + val + '" placeholder="0">'
      + '<span class="ai-unit">oz</span>'
      + '</div></div>';
  }

  var html = '<div class="overlay" id="modal-bg">'
    + '<div class="modal">'
    + '<div class="modal-head">'
    + '<div class="modal-title">Add-ins &mdash; ' + mName + '</div>'
    + '<button class="modal-close" onclick="closeModal()">&#10005;</button>'
    + '</div>'
    + '<div class="modal-hint">Enter ounces (0.25, 0.5, 1…)</div>'
    + rows
    + '<button class="save-btn" onclick="saveModal()">Save Add-ins</button>'
    + '</div></div>';

  document.getElementById("modal-root").innerHTML = html;

  // tap outside to close
  document.getElementById("modal-bg").addEventListener("click", function(e){
    if (e.target === this) closeModal();
  });
}

function closeModal() {
  document.getElementById("modal-root").innerHTML = "";
}

function saveModal() {
  var out = {};
  for (var i=0; i<ADDIN_NAMES.length; i++) {
    var el = document.getElementById("ai" + i);
    if (el) {
      var v = parseFloat(el.value);
      if (v > 0) out[ADDIN_NAMES[i]] = v;
    }
  }
  addinsLog[_modalKey] = out;
  try { localStorage.setItem("mya_addins", JSON.stringify(addinsLog)); } catch(e) {}
  closeModal();
  renderCalendar();
}

// ── NUTRITION ─────────────────────────────────────────────────────────────────
function renderNutrition() {
  var sum = zeroNutr();
  var mealCount = 0;
  var now = new Date();

  for (var i=0; i<30; i++) {
    var d = new Date(now.getFullYear(), now.getMonth(), now.getDate() - i);
    var y=d.getFullYear(), m=d.getMonth(), dd=d.getDate();
    var ds = dateKey(y, m, dd);
    var dow = d.getDay();
    var wk  = getWeekNum(y, m, dd);
    var dayName = DAYS_OF_WEEK[dow];
    var dayMeals = (WEEKS[wk] || {})[dayName] || {};

    var slots = ["am","pm"];
    for (var s=0; s<2; s++) {
      var key = ds + "_" + slots[s];
      if (fedLog[key]) {
        mealCount++;
        var addins = addinsLog[key] || {};
        var n = calcMeal(dayMeals[slots[s]], addins);
        for (var j=0; j<KEYS.length; j++) sum[KEYS[j]] += n[KEYS[j]];
      }
    }
  }

  var el = document.getElementById("page-nutrition");

  if (mealCount === 0) {
    el.innerHTML = '<div class="empty-state">'
      + '<div style="font-size:40px;margin-bottom:16px">🐾</div>'
      + '<div style="font-size:16px;color:#888">No meals logged yet</div>'
      + '<div style="font-size:13px;color:#555;margin-top:8px">Mark meals as Fed in the Calendar tab</div>'
      + '</div>';
    return;
  }

  var days = Math.round(mealCount / 2);
  var avg = {};
  for (var j=0; j<KEYS.length; j++) avg[KEYS[j]] = sum[KEYS[j]] / (mealCount / 2);

  var ok=0, low=0, high=0;
  for (var a=0; a<AAFCO.length; a++) {
    var cfg=AAFCO[a], v=avg[cfg.k];
    if (v < cfg.min) low++;
    else if (cfg.max < 999 && v > cfg.max) high++;
    else ok++;
  }

  var html = '<div class="summary-box">'
    + '<div class="summary-title">30-Day Nutrition Snapshot</div>'
    + '<div class="summary-sub">' + mealCount + ' meals &middot; ~' + days + ' days &middot; daily average</div>'
    + '<div class="pill-row">'
    + '<div class="s-pill" style="background:rgba(76,175,80,.15);color:#4caf50">&#10003; ' + ok + ' Optimal</div>'
    + (low  > 0 ? '<div class="s-pill" style="background:rgba(244,67,54,.15);color:#f44336">&#9888; ' + low  + ' Low</div>'  : '')
    + (high > 0 ? '<div class="s-pill" style="background:rgba(255,152,0,.15);color:#ff9800">&#9888; ' + high + ' High</div>' : '')
    + '</div></div>';

  for (var a=0; a<AAFCO.length; a++) {
    var cfg = AAFCO[a];
    var v = avg[cfg.k];
    var status = v < cfg.min ? "low" : (cfg.max < 999 && v > cfg.max ? "high" : "ok");
    var pct = cfg.max < 9000
      ? Math.min((v / cfg.max) * 100, 100)
      : Math.min((v / (cfg.min * 1.5)) * 100, 100);
    var display = v >= 10 ? Math.round(v) : v.toFixed(2);
    var range = cfg.max < 9000 ? cfg.min + "–" + cfg.max : cfg.min + "+";
    var barColor = status==="ok" ? "#4caf50" : status==="low" ? "#f44336" : "#ff9800";
    var pillBg   = status==="ok" ? "rgba(76,175,80,.15)"  : status==="low" ? "rgba(244,67,54,.15)" : "rgba(255,152,0,.15)";
    var pillColor= status==="ok" ? "#4caf50" : status==="low" ? "#f44336" : "#ff9800";
    var pillText = status==="ok" ? "&#10003; OK" : status==="low" ? "LOW" : "HIGH";

    html += '<div class="n-card">'
      + '<div class="n-head">'
      + '<span class="n-name">' + cfg.label + '</span>'
      + '<span class="n-val">' + display + ' ' + cfg.unit
      + '<span class="n-pill" style="background:' + pillBg + ';color:' + pillColor + '">' + pillText + '</span>'
      + '</span></div>'
      + '<div class="bar-bg"><div class="bar-fill" style="width:' + pct + '%;background:' + barColor + '"></div></div>'
      + '<div class="n-range">Target: ' + range + ' ' + cfg.unit + '</div>'
      + '</div>';
  }

  el.innerHTML = html;
}

      + '<div class="r-section">Optional Add-ins</div>'
      + r.opt.map(function(x){ return '<div class="r-item opt">&circ; ' + x + '</div>'; }).join("")
      + '</div>';
  }

  html += '<div class="recipe-card">'
    + '<div class="r-title">4-Week Protein Rotation</div>'
    + [["Week 1","Beef + Turkey"],["Week 2","Lamb + Pork"],["Week 3","Turkey + Chicken"],["Week 4","Pork + Beef"]]
      .map(function(r){ return '<div style="display:flex;gap:12px;margin-bottom:6px"><span style="font-size:11px;color:#888;width:50px;font-weight:700">'+r[0]+'</span><span style="font-size:13px">'+r[1]+'</span></div>'; })
      .join("")
    + '<div style="font-size:11px;color:#666;margin-top:8px">&#8635; Repeats forever &middot; Fish days rotate sardines &amp; salmon</div>'
    + '</div>';

  document.getElementById("page-recipes").innerHTML = html;

// ── BOOT ──────────────────────────────────────────────────────────────────────
renderCalendar();
</script>
